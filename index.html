<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kalis Gift – Кейсы</title>
    <style>
        body {
            background-color: #141b24;
            color: #ffffff;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            margin: 0; padding: 15px;
            display: flex; flex-direction: column; align-items: center;
            min-height: 100vh; box-sizing: border-box;
            -webkit-user-select: none; user-select: none;
        }
        .header {
            width: 100%; max-width: 400px;
            display: flex; justify-content: space-between;
            align-items: center; margin-bottom: 30px;
            background: #1e2633; padding: 10px 15px; border-radius: 12px;
            box-sizing: border-box;
        }
        .balance { font-size: 18px; font-weight: bold; color: #4caf50; }
        .case-container {
            width: 100%; max-width: 400px;
            background: #1e2633; border-radius: 16px;
            padding: 20px; text-align: center; box-sizing: border-box;
            box-shadow: 0 4px 15px rgba(0,0,0,0.3);
        }
        .case-img { font-size: 64px; margin-bottom: 15px; }
        .btn {
            background: #0078ff; color: #fff; border: none;
            padding: 12px 24px; font-size: 16px; font-weight: bold;
            border-radius: 10px; cursor: pointer; width: 100%;
            transition: background 0.2s; margin-top: 15px;
        }
        .btn:active { background: #0056b3; }
        .reward-display {
            margin-top: 20px; font-size: 18px; font-weight: bold;
            min-height: 24px; color: #ffeb3b;
        }
    </style>
</head>
<body>

    <div class="header">
        <div style="font-size: 16px;">Kalis Gift</div>
        <div class="balance">Баланс: <span id="balance-val">0</span> ⭐️</div>
    </div>

    <div class="case-container">
        <div class="case-img">🧳</div>
        <h3>Обычный кейс</h3>
        <p style="color: #8a99ad; font-size: 14px;">Стоимость: 100 ⭐️</p>
        <button class="btn" onclick="openCase()">Открыть кейс</button>
        <div class="reward-display" id="reward-text"></div>
    </div>

    <script>
        let balance = 0;
        const rewards = [
            { text: "🧸 Плюшевый мишка", value: 150 },
            { text: "❤️ Сердечко", value: 50 },
            { text: "💎 Редкий NFT-предмет", value: 500 },
            { text: "⭐️ 200 Звёзд!", value: 200 },
            { text: "Пустой кейс... повезет в другой раз!", value: 0 }
        ];

        function openCase() {
            if (balance < 100) {
                document.getElementById('reward-text').innerText = "Недостаточно звёзд! ⭐️";
                return;
            }
            
            balance -= 100;
            document.getElementById('balance-val').innerText = balance;
            
            const display = document.getElementById('reward-text');
            display.innerText = "Открытие...";
            
            setTimeout(() => {
                const randomReward = rewards[Math.floor(Math.random() * rewards.length)];
                balance += randomReward.value;
                document.getElementById('balance-val').innerText = balance;
                display.innerText = "Выпало: " + randomReward.text;
            }, 800);
        }
    </script>

</body>
</html>
