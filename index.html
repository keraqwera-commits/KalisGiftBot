<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kalis Gift – Магазин и Подработка</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        body {
            background-color: #141b24; color: #ffffff;
            font-family: -apple-system, BlinkMacSystemFont, sans-serif;
            margin: 0; padding: 15px; display: flex; flex-direction: column; align-items: center;
            -webkit-user-select: none; user-select: none;
        }
        .earn-container {
            width: 100%; max-width: 400px; background: #222e3f; border-radius: 12px;
            padding: 15px; margin-bottom: 20px; box-sizing: border-box; border: 1px dashed #3b4e68;
        }
        .case-grid {
            display: grid; grid-template-columns: 1fr 1fr; gap: 10px; width: 100%; max-width: 400px;
        }
        .case-card {
            background: #1e2633; border-radius: 12px; padding: 15px; text-align: center; border: 1px solid #2c384c;
        }
        .case-icon { font-size: 40px; margin-bottom: 5px; }
        .price { color: #0078ff; font-weight: bold; margin: 5px 0; }
        .btn {
            background: #2ea6ff; color: white; border: none; padding: 10px; border-radius: 8px; width: 100%; font-weight: bold; cursor: pointer;
        }
        .btn:active { background: #0078ff; }
        .btn-earn {
            background: #f39c12; color: white; border: none; padding: 10px; border-radius: 8px; width: 100%; font-weight: bold; cursor: pointer; margin-top: 10px;
        }
        .btn-earn:active { background: #d35400; }
        .status {
            position: fixed; bottom: 20px; background: rgba(0,0,0,0.9); color: #fff; padding: 12px 24px; border-radius: 20px; display: none; text-align: center;
        }
    </style>
</head>
<body>

    <!-- БЛОК ПОДРАБОТКИ -->
    <div class="earn-container">
        <h3 style="margin: 0 0 5px 0; color: #f39c12;">💰 Бесплатные Звёзды</h3>
        <p style="font-size: 13px; color: #8a99ad; margin: 0;">Поделись ботом с другом и получи +1 ⭐️ в день! (Максимум 5 раз)</p>
        <div style="font-weight: bold; margin-top: 10px; font-size: 14px;">Выполнено за сегодня: <span id="share-count">0</span> / 5</div>
        <button class="btn-earn" onclick="shareWithFriend()">Поделиться с другом (+1 ⭐️)</button>
    </div>

    <h2>Магазин Кейсов 🧳</h2>
    <div class="case-grid" id="boxes"></div>
    <div class="status" id="status-bar">Ожидание...</div>

    <script>
        const tg = window.Telegram.WebApp;
        tg.expand();

        // Загружаем из памяти телефона, сколько раз юзер уже поделился сегодня
        let sharesToday = parseInt(localStorage.getItem('sharesToday') || '0');
        document.getElementById('share-count').innerText = sharesToday;

        const cases = [
            { id: 1, name: "Кейс Новичок", price: 8, icon: "✉️" },
            { id: 2, name: "Бомж Кейс", price: 13, icon: "📦" },
            { id: 3, name: "Кейс Лайт", price: 15, icon: "🛍️" },
            { id: 4, name: "Обычный Кейс", price: 25, icon: "💼" },
            { id: 5, name: "Продвинутый Кейс", price: 50, icon: "📂" },
            { id: 6, name: "Стандартный Кейс", price: 100, icon: "🧳" },
            { id: 7, name: "Особый Кейс", price: 449, icon: "🔮" },
            { id: 8, name: "Элитный Кейс", price: 599, icon: "💎" },
            { id: 9, name: "Магический Кейс", price: 899, icon: "👑" },
            { id: 10, name: "Донатерский Кейс", price: 1499, icon: "🏆" }
        ];

        const grid = document.getElementById('boxes');
        cases.forEach(c => {
            grid.innerHTML += `
                <div class="case-card">
                    <div class="case-icon">${c.icon}</div>
                    <div style="font-size: 14px; font-weight: bold;">${c.name}</div>
                    <div class="price">${c.price} ⭐️</div>
                    <button class="btn" onclick="startPayment(${c.price}, '${c.name}')">Открыть</button>
                </div>
            `;
        });

        // ФУНКЦИЯ ДЛЯ ПОДРАБОТКИ
        function shareWithFriend() {
            if (sharesToday >= 5) {
                alert("Ты уже получил максимум (5 ⭐️) на сегодня! Приходи завтра.");
                return;
            }

            // Официальная кнопка Телеграма: открывает выбор друга для отправки ссылки на бота
            tg.openTelegramLink("https://t.me/share/url?url=https://t.me/KalisGiftBot&text=Заходи в крутой бот с кейсами Kalis Gift!");

            // Засчитываем звезду
            sharesToday++;
            localStorage.setItem('sharesToday', sharesToday);
            document.getElementById('share-count').innerText = sharesToday;

            // Отправляем боту сигнал, что юзер заработал звезду
            tg.sendData(JSON.stringify({
                action: "earn_star",
                count: sharesToday
            }));
        }

        function startPayment(price, name) {
            const statusBar = document.getElementById('status-bar');
            statusBar.innerText = `Запрос оплаты: ${price} ⭐️`;
            statusBar.style.display = 'block';

            tg.sendData(JSON.stringify({
                action: "request_payment",
                case_name: name,
                case_price: price
            }));

            setTimeout(() => {
                statusBar.style.display = 'none';
                tg.close();
            }, 1000);
        }
    </script>
</body>
</html>
